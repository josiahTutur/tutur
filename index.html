<!doctype html>
<html lang="ms">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <!--
      interactive-widget=resizes-content — when the on-screen keyboard opens, the
      LAYOUT viewport shrinks so the page reflows above it, instead of the keyboard
      simply covering the bottom of the screen. Without this, a text input pinned
      to the bottom of a full-height layout becomes unreachable the moment it is
      focused. Honoured by Chrome/Android; iOS is handled by useViewportHeight().
    -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content"
    />
    <meta name="theme-color" content="#FBFAFF" />
    <title>Tutur — Intervensi Pertuturan di Rumah</title>
    <!-- Apply the saved theme before first paint (no flash). Default = light. -->
    <script>
      try {
        if (localStorage.getItem("tutur.theme") === "dark") {
          document.documentElement.classList.add("dark");
        }
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
